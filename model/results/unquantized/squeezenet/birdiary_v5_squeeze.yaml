model_name: birdiary_v5_squeeze
output_path: model/results
datasets:
- name: Birdiary
  path: data/v5/dataset
  transforms:
  - RandomResizedCrop:
      height: 224
      width: 224
      scale:
      - 0.8
      - 1.0
  - RandomHorizontalFlip:
      probability: 0.5
  - ColorJitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
  - save_img:
      n: 50
      save_dir: data/transforms_debug_v5_squeeze
  - ToTensor
  - normalize:
      mean:
      - 0.485
      - 0.456
      - 0.406
      std:
      - 0.229
      - 0.224
      - 0.225
batch_size: 32
patience: 5
model_type: squeezenet
num_workers: 4
transfer_learning_epochs: 20
transfer_learning_rate: 0.001
transfer_weight_decay: 0.0001
fine_tune: true
fine_tune_epochs: 20
fine_tuning_learning_rate: 0.0001
fine_tuning_weight_decay: 0.0001
num_unfreezed_feature_layers: 2
